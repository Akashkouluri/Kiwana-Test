services:
  - type: web
    name: kiwana-agent
    env: python
    buildCommand: npm install --prefix Frontend && npm run build --prefix Frontend && pip install -r requirements.txt
    startCommand: uvicorn Backend.API.backend_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false # Provide your Gemini API key in the Render Dashboard
      - key: PINECONE_API_KEY
        sync: false
